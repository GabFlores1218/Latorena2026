<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banquet Reservation Form</title>
</head>
<body bgcolor="#f4f4f4" style="margin: 0; padding: 20px; font-family: Arial, sans-serif;">

    <table align="center" width="700" bgcolor="#ffffff" cellpadding="40" cellspacing="0" style="box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); border-collapse: collapse;">
        <tr>
            <td>
                
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td align="left" valign="middle">
                            <span style="font-size: 32px; color: #ff8c00; font-weight: bold; line-height: 1.1;">Banquet</span><br>
                            <span style="font-size: 42px; color: #000000; font-weight: bold; line-height: 1.1;">Reservation Form</span>
                        </td>
                        <td align="right" valign="middle" style="font-size: 11px; letter-spacing: 3px; font-weight: bold; color: #333333;">
                            <span style="font-size: 30px;">❈</span><br>
                            SPARKING
                        </td>
                    </tr>
                </table>

                <p style="border-top: 2px dashed #000000; margin: 20px 0 30px 0; padding: 0;"></p>

                <form action="#" method="POST">
                    <table width="100%" bgcolor="#ff8c00" cellpadding="12" cellspacing="0" style="margin-bottom: 25px;">
                        <tr>
                            <td align="center" style="font-size: 20px; font-weight: bold; color: #000000;">
                                Contact Information
                            </td>
                        </tr>
                    </table>

                    <table width="100%" cellpadding="0" cellspacing="10" border="0" style="margin-bottom: 20px;">
                        <tr>
                            <td width="50%" valign="top">
                                <label for="customer_name" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Name:</label>
                                <input type="text" id="customer_name" name="customer_name" placeholder="e.g., Alex Rivera" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                            <td width="50%" valign="top">
                                <label for="customer_address" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Address:</label>
                                <input type="text" id="customer_address" name="customer_address" placeholder="e.g., 742 Evergreen Terrace, Springfield" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">
                                <label for="customer_email" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Email Address:</label>
                                <input type="email" id="customer_email" name="customer_email" placeholder="e.g., alex.rivera@example.com" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                            <td valign="top">
                                <label for="customer_phone" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Contact Number:</label>
                                <input type="text" id="customer_phone" name="customer_phone" placeholder="(+63)" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                        </tr>
                    </table>

                    <table width="100%" bgcolor="#ff8c00" cellpadding="12" cellspacing="0" style="margin-bottom: 25px;">
                        <tr>
                            <td align="center" style="font-size: 20px; font-weight: bold; color: #000000;">
                                Event Details
                            </td>
                        </tr>
                    </table>

                    <table width="100%" cellpadding="0" cellspacing="10" border="0" style="margin-bottom: 30px;">
                        <tr>
                            <td width="50%" valign="top">
                                <label for="event_type" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Event Type:</label>
                                <input type="text" id="event_type" name="event_type" placeholder="e.g., Golden Wedding Anniversary" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                            <td width="50%" valign="top">
                                <label for="event_date" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Event Date:</label>
                                <input type="date" id="event_date" name="event_date" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">
                                <label for="event_time" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Event Time:</label>
                                <input type="text" id="event_time" name="event_time" placeholder="e.g., 6:00 PM - 10:00 PM" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                            <td valign="top">
                                <label for="total_guests" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Total Guests:</label>
                                <input type="text" id="total_guests" name="total_guests" placeholder="e.g., 85" style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box;">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" valign="top">
                                <label for="additional_requests" style="font-size: 15px; color: #000000; display: block; margin-bottom: 8px;">Additional Requests:</label>
                                <textarea id="additional_requests" name="additional_requests" placeholder="Type any dietary requirements, setup requests, or AV needs here..." style="width: 100%; padding: 12px; border: 1px solid #a0a0a0; border-radius: 6px; font-size: 16px; box-sizing: border-box; min-height: 150px; resize: vertical;"></textarea>
                            </td>
                        </tr>
                    </table>

                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr>
                            <td align="right">
                                <input type="submit" value="Submit Reservation" style="background-color: #000000; color: #ffffff; font-size: 16px; font-weight: bold; padding: 14px 35px; border: none; border-radius: 6px; cursor: pointer;">
                            </td>
                        </tr>
                    </table>
                </form>

            </td>
        </tr>
    </table>

</body>
</html>
